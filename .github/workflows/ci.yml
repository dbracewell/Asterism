name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality-gates:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/frontend/pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.strictDepBuilds=false

      - name: Rebuild better-sqlite3 native bindings
        run: pnpm --filter @asterism/frontend rebuild better-sqlite3

      - name: Run quality gates
        run: pnpm turbo run lint typecheck test --filter=@asterism/backend --filter=@asterism/frontend

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality-gates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.strictDepBuilds=false

      - name: Rebuild better-sqlite3 native bindings
        run: pnpm --filter @asterism/frontend rebuild better-sqlite3

      - name: Install Playwright browser
        run: pnpm --filter @asterism/frontend exec playwright install --with-deps chromium

      - name: Run frontend e2e tests
        run: pnpm --filter @asterism/frontend test:e2e
