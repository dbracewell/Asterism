name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality-gates:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    container:
      image: node:26-bookworm
      options: --user root
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install native build toolchain
        run: |
          apt-get update
          apt-get install -y build-essential python3 make g++

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.strictDepBuilds=false --config.ignore-scripts=false

      - name: Install frontend workspace dependencies
        run: pnpm --filter @asterism/frontend install --frozen-lockfile --config.strictDepBuilds=false --config.ignore-scripts=false

      - name: Place prebuilt better-sqlite3 binary
        run: |
          mkdir -p node_modules/.pnpm/better-sqlite3@12.10.0/node_modules/better-sqlite3/lib/binding/node-v127-linux-x64
          curl -fSL -o /tmp/better-sqlite3-prebuild.tar.gz \
            "https://github.com/WiseLibs/better-sqlite3/releases/download/v12.10.0/better-sqlite3-v12.10.0-node-v127-linux-x64.tar.gz"
          tar -xzf /tmp/better-sqlite3-prebuild.tar.gz \
            -C node_modules/.pnpm/better-sqlite3@12.10.0/node_modules/better-sqlite3/lib/binding/node-v127-linux-x64/
        shell: bash

      - name: Verify better-sqlite3 loads and opens DB
        run: pnpm --filter @asterism/frontend exec node -e "const Database=require('better-sqlite3'); const db=new Database('ci-verify.db'); db.prepare('select 1').get(); db.close(); console.log('better-sqlite3 ok')"

      - name: Run quality gates
        run: pnpm turbo run lint typecheck test --filter=@asterism/backend --filter=@asterism/frontend

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    container:
      image: node:22.13.0-bookworm
      options: --user root
    timeout-minutes: 20
    needs: quality-gates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install native build toolchain
        run: |
          apt-get update
          apt-get install -y build-essential python3 make g++

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.strictDepBuilds=false --config.ignore-scripts=false

      - name: Install frontend workspace dependencies
        run: pnpm --filter @asterism/frontend install --frozen-lockfile --config.strictDepBuilds=false --config.ignore-scripts=false

      - name: Place prebuilt better-sqlite3 binary
        run: |
          mkdir -p node_modules/.pnpm/better-sqlite3@12.10.0/node_modules/better-sqlite3/lib/binding/node-v127-linux-x64
          curl -fSL -o /tmp/better-sqlite3-prebuild.tar.gz \
            "https://github.com/WiseLibs/better-sqlite3/releases/download/v12.10.0/better-sqlite3-v12.10.0-node-v127-linux-x64.tar.gz"
          tar -xzf /tmp/better-sqlite3-prebuild.tar.gz \
            -C node_modules/.pnpm/better-sqlite3@12.10.0/node_modules/better-sqlite3/lib/binding/node-v127-linux-x64/
        shell: bash

      - name: Verify better-sqlite3 loads and opens DB
        run: pnpm --filter @asterism/frontend exec node -e "const Database=require('better-sqlite3'); const db=new Database('ci-verify.db'); db.prepare('select 1').get(); db.close(); console.log('better-sqlite3 ok')"

      - name: Install Playwright browser
        run: pnpm --filter @asterism/frontend exec playwright install --with-deps chromium

      - name: Run frontend e2e tests
        run: rm -f apps/frontend/ci-users.db && BETTER_AUTH_DB_PATH=ci-users.db pnpm --filter @asterism/frontend test:e2e
